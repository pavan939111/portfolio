services:
  - type: web
    name: portfolio-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: PORT
        value: 8000
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        sync: false # Set to your deployed Vercel URL
      - key: SUPABASE_URL
        sync: false # Set to your Supabase project URL
      - key: SUPABASE_SERVICE_KEY
        sync: false # Set to your Supabase service key
      - key: VOYAGE_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_TO_EMAIL
        sync: false
