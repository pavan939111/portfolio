<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Cyan neon glow -->
    <filter id="cyan-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Purple neon glow -->
    <filter id="purple-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer Brackets [ ] -->
  <path d="M 120 110 H 70 V 402 H 120" stroke="#00f3ff" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#cyan-glow)" />
  <path d="M 392 110 H 442 V 402 H 392" stroke="#00f3ff" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#cyan-glow)" />
  
  <!-- Monogram P -->
  <path d="M 160 160 V 352" stroke="#9d4edd" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#purple-glow)" />
  <path d="M 160 160 H 215 C 260 160, 260 250, 215 250 H 160" stroke="#9d4edd" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#purple-glow)" />
  
  <!-- Monogram K -->
  <path d="M 285 160 V 352" stroke="#9d4edd" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#purple-glow)" />
  <path d="M 345 160 L 290 256 L 350 352" stroke="#9d4edd" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#purple-glow)" />
  
  <!-- Terminal cursor _ -->
  <path d="M 365 352 H 395" stroke="#00f3ff" stroke-width="32" stroke-linecap="round" fill="none" filter="url(#cyan-glow)" />
</svg>